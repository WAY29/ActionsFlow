name: actionsflow

permissions:
  contents: write

on:
  script:
    run: |
      const fs = require("fs")

      const counterPath = "state/readwise-weekly.counter"
      let current = 0
      try {
        current = Number(fs.readFileSync(counterPath, "utf8").trim() || "0")
      } catch (e) {
        current = 0
      }
      const next = current + 1
      const link = `https://wise.readwise.io/issues/wisereads-vol-${next}/`

      try {
        const response = await helpers.axios.get(link, {
          validateStatus: () => true,
          maxRedirects: 5,
        })
        console.log("fetch:", link, "status:", response.status)

        if (response.status !== 200) {
          return []
        }

        const titleMatch = response.data.match(/<title>([^<]+)<\/title>/i)
        const title = titleMatch ? titleMatch[1].trim() : `Wise Reads Vol. ${next}`

        return [
          {
            id: `wisereads-vol-${next}`,
            issue: next,
            link,
            title,
          },
        ]
      } catch (error) {
        return []
      }
    deduplicationKey: id
    config:
      every: 720

concurrency:
  group: actionsflow-readwise-weekly
  cancel-in-progress: false

jobs:
  request:
    name: readwise weekly - Push to Cubox
    runs-on: ubuntu-latest
    steps:
      - name: Debug script outputs
        run: |
          echo 'script outputs: ${{ toJson(on.script.outputs) }}'

      - name: Make a HTTP Request
        uses: actionsflow/axios@v1
        with:
          url: ${{ secrets.CUBOX_URL }}
          method: POST
          body: |
            {
              "type":"url",
              "content":"${{ on.script.outputs.link }}",
              "title":"${{ on.script.outputs.title }}",
              "folder":"AI",
              "tags":["AI", "rss"]
            }

  update_counter:
    name: Update weekly counter
    runs-on: ubuntu-latest
    needs: [request]
    permissions:
      contents: write
    outputs:
      counter: ${{ steps.write_counter.outputs.counter }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        shell: bash
        run: |
          set -euo pipefail
          if [[ "${LOCAL_ACTIONSFLOW_DEBUG:-}" == "true" ]]; then
            npm ci
          else
            npm ci --omit=dev
          fi

      - name: Write latest issue number
        id: write_counter
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p state
          counter="${{ on.script.outputs.issue }}"
          echo "$counter" > state/readwise-weekly.counter
          echo "counter=$counter" >> "$GITHUB_OUTPUT"

      - name: Build readwise RSS input
        shell: bash
        env:
          READWISE_TITLE: ${{ on.script.outputs.title }}
          READWISE_LINK: ${{ on.script.outputs.link }}
        run: |
          set -euo pipefail
          mkdir -p .tmp/readwise-weekly
          node <<'NODE'
          const fs = require("fs")

          const title = (process.env.READWISE_TITLE || "").trim()
          const link = (process.env.READWISE_LINK || "").trim()

          if (!title || !link) {
            throw new Error("Missing readwise title or link")
          }

          fs.writeFileSync(
            ".tmp/readwise-weekly/items.json",
            `${JSON.stringify([{ title, link }], null, 2)}\n`
          )
          NODE

      - name: Build readwise RSS feed
        id: rss
        env:
          RSS_PUBLIC_URL: ${{ secrets.RSS_PUBLIC_URL }}
          RSS_OUTPUT_DIR: public-rss
          RSS_FILENAME: readwise-weekly.xml
          RSS_ITEMS_FILE: .tmp/readwise-weekly/items.json
          RSS_TITLE: Readwise Weekly
          RSS_DESCRIPTION: Weekly Wise Reads issues
          RSS_MAX_ITEMS: 100
        run: node rss-codex-cubox/scripts/build_rss_feed.js

      - name: Debug counter and script outputs
        run: |
          echo "counter: ${{ steps.write_counter.outputs.counter }}"
          echo "feed_url: ${{ steps.rss.outputs.feed_url }}"
          echo "item_count: ${{ steps.rss.outputs.item_count }}"
          echo 'script outputs: ${{ toJson(on.script.outputs) }}'

      - name: Commit & push
        shell: bash
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add state/readwise-weekly.counter public-rss/readwise-weekly.xml public-rss/_headers
          git commit -m "chore: update readwise weekly to ${{ steps.write_counter.outputs.counter }}" || exit 0
          git push
