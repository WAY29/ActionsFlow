name: actionsflow

permissions:
  contents: write

on:
  script:
    path: ./rss-codex-cubox/scripts/fetch_feed_items.js
    deduplicationKey: id
    config:
      every: 180
      outputsMode: combine
      exportOutputs: true

concurrency:
  group: actionsflow-rss-codex-rss
  cancel-in-progress: false

jobs:
  digest:
    name: ak-rss-rss - Summarize RSS and Publish RSS Feed
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          clean: false

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm ci --omit=dev

      - name: ak-rss-rss - Prepare Codex prompt
        id: prepare
        env:
          OUTPUTS_PATH: ${{ on.script.outputs.path }}
        run: node rss-codex-cubox/scripts/build_prompt.js

      - name: ak-rss-rss - Run GPT-5.4 digest scoring
        id: codex
        env:
          PROMPT_FILE: ${{ steps.prepare.outputs.prompt_path }}
          OUTPUT_FILE: .tmp/rss-codex-cubox/codex-output.json
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          OPENAI_API_BASE_URL: ${{ secrets.OPENAI_API_BASE_URL }}
          OPENAI_MODEL: gpt-5.4
          OPENAI_REASONING_EFFORT: medium
        run: node rss-codex-cubox/scripts/run_codex.js

      - name: ak-rss-rss - Build merged RSS feed
        id: rss
        env:
          CODEX_OUTPUT_FILE: .tmp/rss-codex-cubox/codex-output.json
          INPUT_ITEMS_FILE: ${{ steps.prepare.outputs.input_path }}
          RSS_PUBLIC_URL: ${{ secrets.RSS_PUBLIC_URL }}
          RSS_OUTPUT_DIR: public-rss
          RSS_FILENAME: rss-akrss-preferred.xml
          RSS_TITLE: AK RSS Preferred
          RSS_DESCRIPTION: Codex-curated preferred RSS items
          RSS_MAX_ITEMS: 50
        run: node rss-codex-cubox/scripts/build_rss_feed.js

      - name: ak-rss-rss - Commit RSS feed
        shell: bash
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add public-rss/rss-akrss-preferred.xml public-rss/_headers
          git commit -m "chore: update ak rss feed" || exit 0
          git push
