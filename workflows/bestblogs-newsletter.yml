name: actionsflow

permissions:
  contents: read

on:
  rss:
    url: https://www.bestblogs.dev/zh/feeds/rss/newsletter
    config:
      every: "0 15 * * 5,6"
      timeZone: Asia/Shanghai

concurrency:
  group: actionsflow-bestblogs-newsletter
  cancel-in-progress: false

jobs:
  request:
    name: bestblogs newsletter - Push to Cubox
    runs-on: ubuntu-latest
    steps:
      - name: Make a HTTP Request
        uses: actionsflow/axios@v1
        with:
          url: ${{ secrets.CUBOX_URL }}
          method: POST
          body: |
            {
              "type":"url",
              "content":"${{ on.rss.outputs.link }}",
              "title":"${{ on.rss.outputs.title }}",
              "folder":"AI",
              "tags":["AI", "rss", "bestblogs", "newsletter"]
            }
